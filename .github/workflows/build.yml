name: AVR Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler: [gcc, clang]

    name: Build with ${{ matrix.compiler }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake avr-libc gcc-avr binutils-avr clang llvm
    
    - name: Validate project structure
      run: ./validate.sh
    
    - name: Create build directory
      run: mkdir build
    
    - name: Configure CMake
      run: cd build && cmake .. -DAVR_COMPILER=${{ matrix.compiler }}
    
    - name: Build project
      run: cd build && make
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: avr-firmware-${{ matrix.compiler }}
        path: |
          build/*.hex
          build/*.elf
          build/*.bin
          build/*.map
