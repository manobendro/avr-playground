name: AVR Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang llvm lld avr-libc gcc-avr binutils-avr
    
    - name: Validate project structure
      run: ./validate.sh
    
    - name: Create build directory
      run: mkdir build
    
    - name: Configure CMake
      run: cd build && cmake ..
    
    - name: Build project
      run: cd build && make
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: avr-firmware
        path: |
          build/*.hex
          build/*.elf
          build/*.bin
          build/*.map
